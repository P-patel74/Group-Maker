<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Group-Maker</title>

    <link rel="stylesheet" href="style.css" />
    <script defer src="main.js"></script>
  </head>

  <body>
    <h1>Group-Maker</h1>
    <p>Enter any names, items or numbers to make groupings:</p>

    <p>
      <input id="input" placeholder="Enter names here..." />
      <input id="num" placeholder="# of students in each group" />
    </p>
    <button id="btn">GO</button>
    <p><span id="total">Total Names:</span></p>
    <p id="data_length"></p>
    <div id="output"></div>
  </body>
</html>
